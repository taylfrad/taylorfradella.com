    <!-- First-paint: detect theme and apply class before any rendering -->
    <script>
      (function () {
        try {
          // Check sessionStorage for manual theme override first
          var stored = sessionStorage.getItem("theme");
          var dark;
          if (stored === "dark" || stored === "light") {
            dark = stored === "dark";
          } else {
            dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          }
          if (dark) {
            document.documentElement.classList.add("dark");
            document.documentElement.style.colorScheme = "dark";
          } else {
            document.documentElement.classList.remove("dark");
            document.documentElement.style.colorScheme = "light";
          }
        } catch (e) {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }

        var key = "scrollToProjectsPending";
        try {
          sessionStorage.removeItem(key);
        } catch (e) {}
        var p = window.location.pathname;
        if (p === "/" || p === "") {
          var s = window.history.state || {};
          window.history.replaceState(
            Object.assign({}, s, { scrollToProjects: false }),
            "",
            window.location.href,
          );
        }
      })();
    </script>
