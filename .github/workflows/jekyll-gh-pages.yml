name: Test and Deploy Report to Pages

on:
  push:
    branches:
      - main # or your default branch

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Example: Run Node.js tests and generate an HTML report
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Run tests and generate report
        run: npm test -- --coverageReporters=html # Command to run tests and create an HTML report

      # Upload the artifact (e.g., the 'coverage' folder)
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: coverage # The directory containing your HTML report

  deploy-report:
    needs: run-tests # Only run if tests pass and artifact is uploaded
    runs-on: ubuntu-latest
    permissions:
      pages: write # Required to deploy to Pages
      id-token: write # Required by the deploy-pages action
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
