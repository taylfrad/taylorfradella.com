name: CI

on:
  push:
    branches:
      - main
      - test
      - test/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure SWC Linux binding
        run: npm install @swc/core@latest --platform=linux --arch=x64 --no-save

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
